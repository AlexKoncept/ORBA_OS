name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  python-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit

      - name: Backend dependency & audit
        run: |
          if [ -f Orba_OS_Desktop/backend/requirements.txt ]; then
            python -m pip install -r Orba_OS_Desktop/backend/requirements.txt || true
            python -m pip_audit -r Orba_OS_Desktop/backend/requirements.txt || true
          else
            echo "No Python requirements found in Orba_OS_Desktop/backend"
          fi

  node-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Frontend npm audit (if present)
        run: |
          if [ -f Orba_OS_Desktop/frontend/package.json ]; then
            cd Orba_OS_Desktop/frontend
            npm ci || true
            npm audit --audit-level=high || true
          else
            echo "No frontend package.json found"
          fi